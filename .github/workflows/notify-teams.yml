name: notify-teams

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    message_teams:
      runs-on: ubuntu-latest
      name: send message to teams
      steps:
        - uses: actions/checkout@v2
          with:
            token: ${{ secrets.JB_ACCESS_TOKEN }}
            submodules: true
        - run: |
            ./events-messenger/pwsh/Get-NextEvent.ps1
          shell: pwsh
        - run: |
            ./events-messenger/pwsh/Get-Send-TeamsMessage.ps1 -uri -title "Coming up next" -message ${{steps.step1.outputs.message}}
          shell: pwsh
